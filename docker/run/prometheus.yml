global:
  scrape_interval: 15s

scrape_configs:
  - job_name: 'frontend'
    metrics_path: /metrics
    static_configs:
      - targets: ['app_frontend:9090']

  - job_name: 'backend'
    metrics_path: /metrics
    static_configs:
      - targets: ['app_backend:22076']

  - job_name: 'node-exporter'
    metrics_path: /metrics
    static_configs:
      - targets: ['node_exporter:9100']

