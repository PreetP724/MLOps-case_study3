services:
  backend:
    image: preetp724/app_backend:latest
    container_name: app_backend
    ports:
      - '22076:22076'
    networks:
      - app_net
    env_file:
      - .env
    environment:
    - HF_TOKEN=${HF_TOKEN}
    healthcheck:
      test: ['CMD', 'curl', '-f', 'http://localhost:22076/health']
      interval: 10s
      timeout: 3s
      retries: 10
      start_period: 30s
    
  frontend:
    image: preetp724/app_frontend:latest
    container_name: app_frontend
    depends_on:
      - backend
    ports:
      - '22075:22075'
    networks:
      - app_net

  ngrok:
    image: ngrok/ngrok:latest
    container_name: ngrok07
    depends_on:
      - frontend
    command: http frontend:22075
    env_file:
      - .env
    environment:
      NGROK_AUTHTOKEN: ${NGROK_AUTHTOKEN}
    ports:
    - "22078:4040"
    networks:
      - app_net
    #restart: unless-stopped
  
  node-exporter:
    image: quay.io/prometheus/node-exporter:latest
    container_name: node_exporter
    command:
      - --path.rootfs=/host
      - --path.procfs=/host/proc
      - --path.sysfs=/host/sys
      - --collector.filesystem.mount-points-exclude=^/(sys|proc|dev|host|etc)($$|/)
    volumes:
      - /:/host:ro
    pid: host
    networks:
      - app_net
    #restart: unless-stopped

  prometheus:
    image: prom/prometheus:latest
    container_name: prometheus07
    command:
      - --config.file=/etc/prometheus/prometheus.yml
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus
    ports:
      - '22077:9090'
    depends_on:
      - frontend
      - backend
      - node-exporter
    networks:
      - app_net
    #restart: unless-stopped

networks:
  app_net:
    driver: bridge

volumes:
  prometheus_data:
    driver: local
